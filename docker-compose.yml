services:
  postgres:
    image: postgres:16
    container_name: bdsnowflake-postgres
    environment:
      POSTGRES_DB: bdsnowflake
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
      - ./исходные данные:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bdsnowflake"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
